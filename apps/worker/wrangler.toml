name = "shortlink"
main = "src/index.ts"
compatibility_date = "2025-04-01"
account_id = "CLOUDFLARE_ACCOUNT_ID_PLACEHOLDER"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "D1_DATABASE_NAME_PLACEHOLDER"
database_id = "D1_DATABASE_ID_PLACEHOLDER"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "LINKS_KV"
id = "KV_NAMESPACE_ID_PLACEHOLDER"

[vars]
TABLE_PREFIX = ""

[triggers]
crons = ["0 3 * * *"]
